# Globale Einstellungen für das Zählerprogramm (inkl. Logging)
[zaehlen]
    # Datenbank-Anmeldeinformationen
    db_host = "localhost"
    db_user = ""
    db_pwd = ""
    db_name = "Bungalow"
    
    # Datenbank-Optimierungen
    # Häufigkeit des DB-Heartbeats in Sekunden.
    # Eine Prüfung der Verbindung wird alle X Sekunden durchgeführt, auch wenn keine Schreibvorgänge anstehen.
    db_heartbeat_interval_seconds = 300 # Beispiel: alle 5 Minuten (5 * 60 = 300)
    
    # Mindestanzahl von Impulsen, die gesammelt werden, bevor ein Schreibvorgang in die DB ausgelöst wird.
    # Reduziert die Schreiblast auf die Datenbank bei hoher Impulsfrequenz.
    pulse_batch_size = 40 
    
    # Maximaler Timeout in Sekunden. Wenn innerhalb dieser Zeit die 'pulse_batch_size' nicht erreicht wird,
    # werden die gesammelten Impulse trotzdem in die DB geschrieben. Verhindert hohe Latenz bei geringer Impulsrate.
    pulse_batch_timeout_seconds = 60 # Beispiel: alle 60 Sekunden

    # Logging-Einstellungen
    log_level = "INFO"
    log_ip = "localhost"
    log_port = 5005
    
[schalten]  
    # NEU: Pfade zu den 433MHz-Programmen (falls verwendet)
    # Wenn du keine 433MHz-Geräte hast oder die Standardpfade ok sind,
    # kannst du diese auch weglassen oder leer lassen.
    codesend_path = "/home/pi/433Utils/RPi_utils/codesend"
    send_path = "/home/pi/433Utils/RPi_utils/send"
    
    # Datenbank-Anmeldeinformationen
    #db_host = "pinsv.b5.intern"
    db_host = "localhost"
    db_user = ""
    db_pwd = ""
    db_name = "Bungalow"
    
    # MQTT-Anmeldeinformationen (jetzt hierher verschoben!)
    mqtt_host = "localhost"
    mqtt_port = 1883
    mqtt_user = ""
    mqtt_pwd = ""
    # Optional: MQTT GET Topic Suffix für Statusabfragen
    # Standardmäßig versuchen Zigbee2MQTT-Geräte, ihren Status zu senden.
    # Wenn du jedoch einen expliziten "get"-Befehl senden musst,
    # z.B. wenn das Gerät nicht von selbst nach dem "set" antwortet,
    # und dein Broker/Gateway dies unterstützt, kannst du hier ein Topic angeben.
    # Beispiel für Zigbee2MQTT: topic/get
    # Normalerweise nicht nötig, wenn das Gerät auf /state aktualisiert.
    # mqtt_get_topic_suffix = "/get" # Optional und nur, wenn dein Gerät es unterstützt und nötig ist.

    # Bei Nutzung von RemoteGPIO den den Hostnomen oder IP eintragen
    remote_gpio_host = "localhost"

    #Anzahl der Schaltversuche für 433MHz Funksteckdosen
    attempts = 2
    
    # Logging Level Settings
    log_level = "WARNING"

[temperatur]
    # Steuerung für Schaltfunktionen Heizung
    # Wenn Schalten im Standardpfad '/home/pi'
    # kannst du diese Zeile weglasssen oder leer lassen
    schalten_path = "/home/pi/Schalten"
    
    # Datenbank-Anmeldeinformationen
    db_host = "localhost"
    db_user = ""
    db_pwd = ""
    db_name = "Bungalow"

    # Liegt die gemessene Temperatur unterhalb 'heather_general'
    # werden Schalffunktionen ausgeführt
    heather_general = 7
    heather_on = 3
    heather_off = 5

    # Logging Level Settings
    log_level = "WARNING"

# Beispiel für weitere mögliche Konfigurationen (können hier bleiben)
[application_settings]
polling_interval_seconds = 60
debug_mode = false
